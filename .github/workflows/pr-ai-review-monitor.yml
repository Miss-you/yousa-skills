name: PR AI Review Monitor

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: Optional PR number to scan
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-ai-review-monitor
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Scan all open PRs
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.pr_number == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          python3 scripts/pr_ai_review_monitor.py \
            --repo "${{ github.repository }}" \
            --output artifacts/pr-ai-review-report.md
          cat artifacts/pr-ai-review-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Scan one PR
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          python3 scripts/pr_ai_review_monitor.py \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.inputs.pr_number }}" \
            --output artifacts/pr-ai-review-report.md
          cat artifacts/pr-ai-review-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: pr-ai-review-report
          path: artifacts/pr-ai-review-report.md
